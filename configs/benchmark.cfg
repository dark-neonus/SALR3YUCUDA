# ── Computational grid ──────────────────────────────────────────────────────
# Benchmark config — same physical parameters as default.cfg,
# but with I/O disabled so disk writes don't inflate timing numbers.
[grid]
dx  = 0.1
dy  = 0.1
nx  = 160
ny  = 160
boundary_mode = PBC
init_mode = sinusoids

# ── Physics ─────────────────────────────────────────────────────────────────
[physics]
temperature    = 8.0
rho1           = 0.2
rho2           = 0.2
cutoff_radius  = 8.0

# ── Interaction matrix — 3Y (Yukawa) potential parameters ───────────────────
[interaction]
A_11_1 =  150.6561472
A_11_2 = -122.6130119
A_11_3 =   27.11810649
a_11_1 =    1.92325375
a_11_2 =    1.261150
a_11_3 =    0.756690

A_12_1 =  413.5305236
A_12_2 = -275.6870157
A_12_3 =    0.0
a_12_1 =    3.405465108
a_12_2 =    3.0
a_12_3 =    1.0

A_22_1 =  413.5305236
A_22_2 = -275.6870157
A_22_3 =    0.0
a_22_1 =    3.405465108
a_22_2 =    3.0
a_22_3 =    1.0

# ── Picard iteration solver ─────────────────────────────────────────────────
[solver]
max_iterations         = 1000
tolerance              = 1.0e-8
xi1                    = 0.02
xi2                    = 0.02
error_change_threshold = 1.0e-10
xi_damping_factor      = 1.0

# ── Output — writes disabled for clean timing ────────────────────────────────
[output]
output_dir = /tmp/salr_bench_output/
save_every = 999999             # effectively disabled
