# ── Computational grid ──────────────────────────────────────────────────────
[grid]
Lx  = 32.0                  # system size along x
Ly  = 32.0                  # system size along y
dx  = 0.2                   # discretisation step along x
dy  = 0.2                   # discretisation step along y
nx  = 160                    # grid nodes along x   (Lx / dx)
ny  = 160                    # grid nodes along y   (Ly / dy)
boundary_mode = PBC     # PBC | W2 (walls in x) | W4 (walls on all sides)

# ── Physics ─────────────────────────────────────────────────────────────────
[physics]
temperature    = 2.9     # environment temperature, T
rho1           = 0.4         # average density of species 1
rho2           = 0.2         # average density of species 2
cutoff_radius  = 16.0         # interaction cutoff radius, r_c

# ── Interaction matrix — 3Y (Yukawa) potential parameters ───────────────────
[interaction]
A_11_1 =  150.6561472
A_11_2 = -122.6130119
A_11_3 =   27.11810649
a_11_1 =    1.92325375
a_11_2 =    1.261150
a_11_3 =    0.756690

A_12_1 =  413.5305236
A_12_2 = -275.6870157
A_12_3 =    0.0
a_12_1 =    3.405465108
a_12_2 =    3.0
a_12_3 =    1.0

A_22_1 =  413.5305236
A_22_2 = -275.6870157
A_22_3 =    0.0
a_22_1 =    3.405465108
a_22_2 =    3.0
a_22_3 =    1.0

# ── Picard iteration solver ─────────────────────────────────────────────────
[solver]
max_iterations         = 50000
tolerance              = 1.0e-8      # convergence accuracy, epsilon
xi1                    = 0.2       # mixing coefficient for species 1
xi2                    = 0.2       # mixing coefficient for species 2
error_change_threshold = 1.0e-6     # when error change < this, apply damping
xi_damping_factor      = 0.5         # multiply xi by this when error stabilizes

# ── Output ──────────────────────────────────────────────────────────────────
[output]
output_dir = output/
save_every = 1000             # save density profile every N iterations

